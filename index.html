<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY-PS | Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --gt-brown: #5d3a1a;
            --gt-dark-brown: #2d1a0b;
            --gt-yellow: #f8e71c;
            --gt-blue: #29abe2;
            --gt-green: #7ed321;
            --gt-red: #ff4d4d;
            --bg-black: #080808;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #080808 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Status Bar */
        .top-nav-status {
            background: #000;
            border-bottom: 2px solid #222;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            font-family: 'Arial Black', sans-serif;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: 900;
        }

        .status-online { color: var(--gt-green); text-shadow: 0 0 8px rgba(126, 211, 33, 0.5); }

        /* Navigation */
        nav {
            background: linear-gradient(to bottom, var(--gt-dark-brown), #111);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 6px;
            border-bottom: 3px solid var(--gt-yellow);
            position: sticky; top: 0; z-index: 100;
            flex-wrap: wrap;
        }

        nav button {
            background: #111;
            border: 1px solid var(--gt-yellow);
            color: white;
            padding: 8px 14px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        nav button:hover, nav button.active {
            background: var(--gt-yellow);
            color: black;
            box-shadow: 0 0 10px rgba(248, 231, 28, 0.3);
        }

        /* Content Area */
        .container { max-width: 700px; margin: 25px auto; padding: 0 15px; }

        section { display: none; }
        section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-box {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid var(--gt-brown);
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .section-title {
            font-size: 20px;
            color: var(--gt-yellow);
            margin-bottom: 20px;
            border-left: 3px solid var(--gt-yellow);
            padding-left: 12px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Cards */
        .item-card {
            background: #151515;
            border: 1px solid #252525;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .item-card:hover { 
            border-color: var(--gt-yellow); 
            background: #1a1a1a;
            transform: scale(1.01);
        }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal {
            background: #0f0f0f;
            border: 1px solid var(--gt-brown);
            border-radius: 12px;
            width: 95%; max-width: 450px;
            padding: 25px;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute; top: 15px; right: 15px;
            background: #333; border: none; color: white;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            font-weight: bold;
        }

        .modal-title { color: var(--gt-yellow); text-align: center; font-size: 26px; font-weight: 900; margin-bottom: 8px; }
        .modal-desc { color: #aaa; text-align: center; font-size: 14px; margin-bottom: 20px; line-height: 1.5; white-space: pre-wrap; }

        /* Drops */
        .drops-label { color: var(--gt-green); font-weight: 900; font-size: 11px; margin-bottom: 12px; letter-spacing: 1px; }
        .drop-row {
            background: #000; border-left: 4px solid var(--gt-green);
            padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
            border-radius: 4px;
        }
        .drop-name { font-weight: bold; font-size: 15px; }
        .drop-chance { color: var(--gt-yellow); font-family: monospace; font-size: 14px; }

        /* Form Styling */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--gt-yellow); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 6px; outline: none;
        }

        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 6px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; 
            transition: opacity 0.2s; margin-top: 5px;
        }
        .btn-save { background: var(--gt-yellow); color: black; }
        .btn-delete { background: var(--gt-red); color: white; margin-top: 10px; }
        .btn-edit { background: var(--gt-blue); color: white; }

        /* Loader Overlay */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top-color: var(--gt-yellow); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader-screen">
    <div class="spinner"></div>
    <div style="color: var(--gt-yellow); font-weight: bold; letter-spacing: 2px;">SYNCHRONIZING WITH DAY-PS CLOUD...</div>
</div>

<div class="top-nav-status">
    <div class="status-item status-online">
        <i data-lucide="shield-check" style="width:16px"></i> SERVER: <span id="txt-server">ONLINE</span>
    </div>
    <div class="status-item status-online">
        <i data-lucide="zap" style="width:16px"></i> DEPOSITS: <span id="txt-deposit">ACTIVE</span>
    </div>
</div>

<nav id="main-nav">
    <button class="active" onclick="showTab('updates', this)">Updates</button>
    <button onclick="showTab('customs', this)">Customs</button>
    <button onclick="showTab('events', this)">Events</button>
    <button onclick="showTab('rich', this)">Get Rich</button>
    <button id="btn-login-trigger" onclick="openModal('modalLogin')">Admin Login</button>
    <button id="btn-new-post" style="display:none; background: var(--gt-green); border-color: var(--gt-green); color:black;" onclick="openEditor()">+ NEW POST</button>
</nav>

<div class="container">
    <div class="section-box">
        <section id="updates" class="active"><div class="section-title">Latest Updates</div><div class="list"></div></section>
        <section id="customs"><div class="section-title">Custom Items</div><div class="list"></div></section>
        <section id="events"><div class="section-title">Active Events</div><div class="list"></div></section>
        <section id="rich"><div class="section-title">Economy Guide</div><div class="list"></div></section>
    </div>
</div>

<!-- Details Modal -->
<div id="modalDetails" class="modal-overlay" onclick="handleOverlayClick(event, 'modalDetails')">
    <div class="modal">
        <button class="close-btn" onclick="closeModal('modalDetails')">×</button>
        <div class="modal-title" id="det-title">Item Name</div>
        <div class="modal-desc" id="det-desc">Description text goes here.</div>
        
        <div id="drops-section" style="display:none;">
            <div class="drops-label">REWARDS / DROPS:</div>
            <div id="det-drops"></div>
        </div>

        <div id="admin-actions" style="display:none; margin-top: 30px; border-top: 1px solid #222; padding-top: 20px;">
            <button class="btn btn-edit" id="action-edit">EDIT POST</button>
            <button class="btn btn-delete" id="action-delete">DELETE PERMANENTLY</button>
        </div>
    </div>
</div>

<!-- Editor Modal -->
<div id="modalEditor" class="modal-overlay" onclick="handleOverlayClick(event, 'modalEditor')">
    <div class="modal">
        <button class="close-btn" onclick="closeModal('modalEditor')">×</button>
        <h2 id="editor-header" style="color:var(--gt-yellow); margin-top:0;">New Post</h2>
        <input type="hidden" id="edit-id">
        
        <div class="form-group">
            <label>Section</label>
            <select id="post-cat">
                <option value="updates">Updates</option>
                <option value="customs">Customs</option>
                <option value="events">Events</option>
                <option value="rich">Get Rich</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Post Title</label>
            <input type="text" id="post-title" placeholder="e.g. New Super Sword">
        </div>
        
        <div class="form-group">
            <label>Details</label>
            <textarea id="post-desc" rows="5" placeholder="Describe the update or item..."></textarea>
        </div>

        <div class="drops-label">Items / Drops</div>
        <div id="editor-drops-list"></div>
        <button class="btn" style="background:#222; color:#fff; font-size:10px; padding:8px;" onclick="addDropInput()">+ ADD ITEM LINE</button>

        <button class="btn btn-save" style="margin-top:20px" onclick="handleSave()">SAVE TO CLOUD</button>
    </div>
</div>

<!-- Login Modal -->
<div id="modalLogin" class="modal-overlay" onclick="handleOverlayClick(event, 'modalLogin')">
    <div class="modal" style="max-width:320px">
        <h2 style="text-align:center; color:var(--gt-yellow);">Admin Login</h2>
        <p style="text-align:center; font-size:12px; color:#666; margin-bottom:20px;">Enter password to enable editing</p>
        <input type="password" id="admin-pass" placeholder="Password" style="width:100%; padding:14px; margin-bottom:15px; background:#111; border:1px solid #333; color:white; border-radius:6px;">
        <button class="btn btn-save" onclick="handleLogin()">Login</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, collection, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let db, auth;
    let allPosts = [];
    let isAdmin = false;
    
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'dayps-v3';
    const firebaseConfig = JSON.parse(__firebase_config);

    // Initialization
    async function startApp() {
        lucide.createIcons();
        
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            // Auth Priority Workflow
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('loader-screen').style.display = 'none';
                    syncPosts();
                }
            });

            await initAuth();
        } catch(e) {
            console.error(e);
            document.getElementById('loader-screen').innerHTML = `<div style="color:red; font-weight:bold; padding:20px; text-align:center;">CONNECTION FAILED: ${e.message}</div>`;
        }
    }

    // Real-time Sync Logic with Correct Path Structure
    function syncPosts() {
        if (!auth.currentUser) return;

        // Correct Path: /artifacts/{appId}/public/data/{collectionName}
        const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
        
        onSnapshot(postsRef, (snapshot) => {
            allPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderAll();
        }, (err) => {
            console.error("Firestore Sync Error:", err);
            if (err.code === 'permission-denied') {
                // Potential fallback if sync fails due to rules
                console.warn("Permissions insufficient. Verify path structure.");
            }
        });
    }

    function renderAll() {
        const sections = ['updates', 'customs', 'events', 'rich'];
        sections.forEach(cat => {
            const container = document.querySelector(`#${cat} .list`);
            if (!container) return;
            
            const filtered = allPosts.filter(p => p.cat === cat);
            container.innerHTML = filtered.length 
                ? '' 
                : '<div style="text-align:center; color:#444; padding:50px;">Nothing posted here yet.</div>';

            filtered.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)).forEach(post => {
                const el = document.createElement('div');
                el.className = 'item-card';
                el.innerHTML = `
                    <div style="font-weight:bold;">${post.title}</div>
                    <i data-lucide="arrow-right" style="width:16px; color:#444;"></i>
                `;
                el.onclick = () => showPostDetails(post);
                container.appendChild(el);
            });
        });
        lucide.createIcons();
    }

    window.showPostDetails = (post) => {
        document.getElementById('det-title').innerText = post.title;
        document.getElementById('det-desc').innerText = post.desc;
        
        const dropList = document.getElementById('det-drops');
        const dropBox = document.getElementById('drops-section');
        dropList.innerHTML = '';
        
        if (post.drops && post.drops.length > 0) {
            dropBox.style.display = 'block';
            post.drops.forEach(d => {
                const div = document.createElement('div');
                div.className = 'drop-row';
                div.innerHTML = `<span class="drop-name">${d.name}</span><span class="drop-chance">${d.chance}%</span>`;
                dropList.appendChild(div);
            });
        } else {
            dropBox.style.display = 'none';
        }

        const adminBar = document.getElementById('admin-actions');
        adminBar.style.display = isAdmin ? 'block' : 'none';

        document.getElementById('action-edit').onclick = () => { closeModal('modalDetails'); openEditor(post); };
        document.getElementById('action-delete').onclick = () => deletePost(post.id);

        openModal('modalDetails');
    };

    window.handleSave = async () => {
        if (!auth.currentUser) return;
        
        const id = document.getElementById('edit-id').value || Date.now().toString();
        const cat = document.getElementById('post-cat').value;
        const title = document.getElementById('post-title').value.trim();
        const desc = document.getElementById('post-desc').value.trim();

        if (!title) return alert("Title is required");

        const drops = [];
        document.querySelectorAll('.editor-drop-row').forEach(row => {
            const name = row.querySelector('.in-name').value.trim();
            const chance = row.querySelector('.in-chance').value.trim();
            if (name) drops.push({ name, chance });
        });

        try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', id);
            await setDoc(docRef, {
                cat, title, desc, drops, 
                createdAt: id.length > 15 ? Date.now() : (allPosts.find(p => p.id === id)?.createdAt || Date.now())
            });
            closeModal('modalEditor');
        } catch(e) {
            alert("Save failed: " + e.message);
        }
    };

    window.deletePost = async (id) => {
        if (!auth.currentUser) return;
        if (!confirm("Are you sure? This cannot be undone.")) return;
        try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', id);
            await deleteDoc(docRef);
            closeModal('modalDetails');
        } catch(e) {
            alert("Delete failed.");
        }
    };

    window.openEditor = (post = null) => {
        document.getElementById('editor-header').innerText = post ? "Edit Post" : "Create Post";
        document.getElementById('edit-id').value = post ? post.id : "";
        document.getElementById('post-cat').value = post ? post.cat : "updates";
        document.getElementById('post-title').value = post ? post.title : "";
        document.getElementById('post-desc').value = post ? post.desc : "";
        document.getElementById('editor-drops-list').innerHTML = "";
        
        if (post && post.drops) {
            post.drops.forEach(d => addDropInput(d.name, d.chance));
        }
        openModal('modalEditor');
    };

    window.addDropInput = (name = "", chance = "") => {
        const div = document.createElement('div');
        div.className = 'editor-drop-row';
        div.style.display = 'flex';
        div.style.gap = '5px';
        div.style.marginBottom = '5px';
        div.innerHTML = `
            <input type="text" placeholder="Item" value="${name}" class="in-name" style="flex:2; padding:8px; background:#111; border:1px solid #333; color:white;">
            <input type="text" placeholder="%" value="${chance}" class="in-chance" style="flex:1; padding:8px; background:#111; border:1px solid #333; color:white;">
            <button onclick="this.parentElement.remove()" style="background:#444; border:none; color:white; width:35px; border-radius:4px; cursor:pointer">×</button>
        `;
        document.getElementById('editor-drops-list').appendChild(div);
    };

    window.handleLogin = () => {
        const pass = document.getElementById('admin-pass').value;
        if (pass === "Adm1n123") {
            isAdmin = true;
            document.getElementById('btn-login-trigger').style.display = 'none';
            document.getElementById('btn-new-post').style.display = 'block';
            closeModal('modalLogin');
            renderAll();
        } else {
            alert("Incorrect password.");
        }
    };

    window.showTab = (id, btn) => {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.handleOverlayClick = (e, id) => { if (e.target.id === id) closeModal(id); };

    startApp();
</script>

</body>
</html>
