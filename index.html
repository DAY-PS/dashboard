<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY-PS | Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --gt-brown: #5d3a1a;
            --gt-dark-brown: #2d1a0b;
            --gt-yellow: #f8e71c;
            --gt-blue: #29abe2;
            --gt-green: #7ed321;
            --gt-red: #ff4d4d;
            --bg-black: #080808;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #080808 100%);
            color: white;
            min-height: 100vh;
        }

        /* Status Bar */
        .top-nav-status {
            background: #000;
            border-bottom: 2px solid #222;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            font-family: 'Arial Black', sans-serif;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .status-online { color: var(--gt-green); text-shadow: 0 0 10px rgba(126, 211, 33, 0.4); }
        .status-offline { color: var(--gt-red); text-shadow: 0 0 10px rgba(255, 77, 77, 0.4); }

        /* Navigation */
        nav {
            background: linear-gradient(to bottom, var(--gt-dark-brown), #111);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 8px;
            border-bottom: 3px solid var(--gt-yellow);
            position: sticky; top: 0; z-index: 100;
        }

        nav button {
            background: #111;
            border: 1px solid var(--gt-yellow);
            color: white;
            padding: 6px 15px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        nav button:hover, nav button.active {
            background: var(--gt-yellow);
            color: black;
        }

        /* Content Area */
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        section { display: none; }
        section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-box {
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid var(--gt-brown);
            border-radius: 12px;
            padding: 25px;
            min-height: 300px;
        }

        .section-title {
            font-size: 24px;
            color: white;
            margin-bottom: 20px;
            border-left: 4px solid var(--gt-yellow);
            padding-left: 15px;
        }

        /* Cards */
        .item-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }

        .item-card:hover { border-color: var(--gt-green); }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: #111;
            border: 2px solid var(--gt-brown);
            border-radius: 15px;
            width: 90%; max-width: 450px;
            padding: 30px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute; top: 15px; right: 15px;
            background: var(--gt-red); border: none; color: white;
            width: 30px; height: 30px; border-radius: 5px; cursor: pointer;
            font-weight: bold; z-index: 10;
        }

        .modal-title { color: var(--gt-yellow); text-align: center; font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .modal-desc { color: #ccc; text-align: center; font-size: 14px; margin-bottom: 25px; white-space: pre-wrap; }

        .drops-label { color: var(--gt-green); font-weight: bold; font-size: 12px; margin-bottom: 15px; text-transform: uppercase; }

        .drop-row {
            background: #000; border: 1.5px solid var(--gt-green); border-radius: 10px;
            padding: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
        }

        .drop-info b { display: block; font-size: 16px; }
        .drop-info span { color: #888; font-size: 13px; }
        .drop-info .chance { color: var(--gt-yellow); }

        /* Admin UI */
        .admin-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-edit { background: var(--gt-blue); color: white; }
        .btn-delete { background: var(--gt-red); color: white; }
        .btn-save { background: var(--gt-green); color: black; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--gt-yellow); font-size: 12px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px;
        }

        .drop-input-row { display: flex; gap: 5px; margin-bottom: 5px; }
        
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 2000; display: flex; align-items: center; justify-content: center;
            color: var(--gt-yellow); font-weight: bold;
        }
    </style>
</head>
<body>

<div id="loader">CONNECTING TO DAY-PS CLOUD...</div>

<div class="top-nav-status">
    <div class="status-item status-online" id="status-server">
        <i data-lucide="signal"></i> SERVER STATUS: <span id="txt-server">ONLINE</span>
    </div>
    <div class="status-item status-online" id="status-deposit">
        <i data-lucide="wallet"></i> DEPOSIT STATUS: <span id="txt-deposit">ACTIVE</span>
    </div>
</div>

<nav id="main-nav">
    <button class="active" onclick="showTab('updates', this)">Updates</button>
    <button onclick="showTab('customs', this)">Customs</button>
    <button onclick="showTab('events', this)">Events</button>
    <button onclick="showTab('rich', this)">Get Rich</button>
    <button id="btn-login" onclick="openLogin()">Login</button>
    <button id="btn-new" style="display:none; background: var(--gt-green); color:black;" onclick="openEditor()">+ NEW POST</button>
</nav>

<div class="container">
    <div class="section-box">
        <section id="updates" class="active"><div class="section-title">Updates</div><div class="list"></div></section>
        <section id="customs"><div class="section-title">Custom Items</div><div class="list"></div></section>
        <section id="events"><div class="section-title">Events</div><div class="list"></div></section>
        <section id="rich"><div class="section-title">Get Rich Guide</div><div class="list"></div></section>
    </div>
</div>

<!-- Details Modal -->
<div id="modalDetails" class="modal-overlay" onclick="closeM('modalDetails', event)">
    <div class="modal">
        <button class="close-btn" onclick="closeM('modalDetails')">X</button>
        <div class="modal-title" id="det-title">Item Name</div>
        <div class="modal-desc" id="det-desc">Description</div>
        
        <div id="drops-wrapper">
            <div class="drops-label">DROPS WHEN BROKEN:</div>
            <div id="det-drops"></div>
        </div>

        <div class="admin-actions" id="admin-tools" style="display:none">
            <button class="btn btn-edit" id="btn-edit-post">EDIT POST</button>
            <button class="btn btn-delete" id="btn-delete-post">DELETE</button>
        </div>
    </div>
</div>

<!-- Editor Modal -->
<div id="modalEditor" class="modal-overlay" onclick="closeM('modalEditor', event)">
    <div class="modal">
        <button class="close-btn" onclick="closeM('modalEditor')">X</button>
        <h2 id="editor-title">Create Post</h2>
        <input type="hidden" id="edit-id">
        
        <div class="form-group">
            <label>Category</label>
            <select id="post-cat">
                <option value="updates">Updates</option>
                <option value="customs">Customs</option>
                <option value="events">Events</option>
                <option value="rich">Get Rich</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="post-title">
        </div>
        
        <div class="form-group">
            <label>Description</label>
            <textarea id="post-desc" rows="4"></textarea>
        </div>

        <div class="drops-label">Drops (Optional)</div>
        <div id="editor-drops-list"></div>
        <button class="btn" style="background:#333; margin-bottom:15px; font-size:10px;" onclick="addDropInput()">+ ADD DROP</button>

        <button class="btn btn-save" onclick="savePost()">PUBLISH TO CLOUD</button>
    </div>
</div>

<!-- Login Modal -->
<div id="modalLogin" class="modal-overlay" onclick="closeM('modalLogin', event)">
    <div class="modal" style="max-width:300px">
        <h2 style="text-align:center">Admin Access</h2>
        <input type="password" id="admin-pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px; background:#222; border:1px solid #444; color:white;">
        <button class="btn btn-edit" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, collection, setDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let db, auth;
    let posts = [];
    let isAdmin = false;
    let currentAppId = 'dayps-v2';

    // --- Boot Logic ---
    async function init() {
        lucide.createIcons();
        
        try {
            const config = JSON.parse(__firebase_config);
            const app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);
            currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'dayps-v2';

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('loader').style.display = 'none';
                    setupListeners(currentAppId);
                }
            });

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch(e) {
            console.error("Init Error:", e);
            document.getElementById('loader').innerText = "CONNECTION FAILED. REFRESH PAGE.";
        }
    }

    function setupListeners(appId) {
        // Real-time Posts Listener
        const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
        onSnapshot(postsRef, (snap) => {
            posts = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderPosts();
        }, (err) => console.error("Snapshot error:", err));
    }

    function renderPosts() {
        const cats = ['updates', 'customs', 'events', 'rich'];
        cats.forEach(c => {
            const list = document.querySelector(`#${c} .list`);
            if (!list) return;
            list.innerHTML = '';
            
            const filtered = posts.filter(p => p.cat === c);
            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center; opacity:0.2; padding:40px;">No entries yet</div>';
            }

            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `<span>${p.title}</span><i data-lucide="chevron-right" style="width:16px"></i>`;
                div.onclick = () => showDetails(p);
                list.appendChild(div);
            });
        });
        lucide.createIcons();
    }

    window.showDetails = (p) => {
        document.getElementById('det-title').innerText = p.title;
        document.getElementById('det-desc').innerText = p.desc;
        
        const dropsContainer = document.getElementById('det-drops');
        const dropsWrapper = document.getElementById('drops-wrapper');
        dropsContainer.innerHTML = '';
        
        if (p.drops && p.drops.length > 0) {
            dropsWrapper.style.display = 'block';
            p.drops.forEach(d => {
                const div = document.createElement('div');
                div.className = 'drop-row';
                div.innerHTML = `
                    <div class="drop-info">
                        <b>${d.name}</b>
                        <span>Chance: <span class="chance">${d.chance}%</span></span>
                    </div>
                `;
                dropsContainer.appendChild(div);
            });
        } else {
            dropsWrapper.style.display = 'none';
        }
        
        const tools = document.getElementById('admin-tools');
        tools.style.display = isAdmin ? 'flex' : 'none';
        
        document.getElementById('btn-edit-post').onclick = () => { closeM('modalDetails'); openEditor(p); };
        document.getElementById('btn-delete-post').onclick = () => deletePost(p.id);

        document.getElementById('modalDetails').style.display = 'flex';
        lucide.createIcons();
    };

    window.openEditor = (data = null) => {
        document.getElementById('editor-title').innerText = data ? "Edit Post" : "Create Post";
        document.getElementById('edit-id').value = data ? data.id : "";
        document.getElementById('post-cat').value = data ? data.cat : "updates";
        document.getElementById('post-title').value = data ? data.title : "";
        document.getElementById('post-desc').value = data ? data.desc : "";
        document.getElementById('editor-drops-list').innerHTML = "";
        
        if (data && data.drops) {
            data.drops.forEach(d => addDropInput(d.name, d.chance));
        }
        
        document.getElementById('modalEditor').style.display = 'flex';
    };

    window.addDropInput = (name = "", chance = "") => {
        const div = document.createElement('div');
        div.className = 'drop-input-row';
        div.innerHTML = `
            <input type="text" placeholder="Item Name" value="${name}" class="d-name" style="flex:2">
            <input type="text" placeholder="%" value="${chance}" class="d-chance" style="flex:1">
            <button onclick="this.parentElement.remove()" style="background:var(--gt-red); border:none; color:white; padding:5px; border-radius:4px; cursor:pointer">X</button>
        `;
        document.getElementById('editor-drops-list').appendChild(div);
    };

    window.savePost = async () => {
        const id = document.getElementById('edit-id').value || Date.now().toString();
        const cat = document.getElementById('post-cat').value;
        const title = document.getElementById('post-title').value;
        const desc = document.getElementById('post-desc').value;
        
        if (!title) return alert("Title required");

        const drops = [];
        document.querySelectorAll('.drop-input-row').forEach(row => {
            const n = row.querySelector('.d-name').value;
            const c = row.querySelector('.d-chance').value;
            if (n) drops.push({ name: n, chance: c });
        });

        try {
            await setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'posts', id), {
                cat, title, desc, drops, updatedAt: Date.now()
            });
            closeM('modalEditor');
        } catch (e) {
            alert("Error saving: " + e.message);
        }
    };

    window.deletePost = async (id) => {
        if (!confirm("Are you sure you want to delete this post forever?")) return;
        try {
            await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'posts', id));
            closeM('modalDetails');
        } catch (e) {
            alert("Error deleting: " + e.message);
        }
    };

    window.showTab = (id, btn) => {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    window.openLogin = () => document.getElementById('modalLogin').style.display = 'flex';
    
    window.doLogin = () => {
        const p = document.getElementById('admin-pass').value;
        if (p === "Adm1n123") {
            isAdmin = true;
            document.getElementById('btn-login').style.display = 'none';
            document.getElementById('btn-new').style.display = 'block';
            closeM('modalLogin');
            renderPosts();
        } else {
            alert("Wrong password");
        }
    };

    window.closeM = (id, e) => {
        if (!e || e.target.classList.contains('modal-overlay')) {
            document.getElementById(id).style.display = 'none';
        }
    };

    init();
</script>

</body>
</html>
